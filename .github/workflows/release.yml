name: Release

on:
  workflow_dispatch:
    inputs:
      release-name:
        description: "The name for the new release"
        required: true
        default: 'v1.0.0'
      release-tag:
        description: "The tag for the new release (e.g. v1.0.0)"
        required: true
        default: 'v1.0.0'

jobs:
  release:
    name: Build & Release for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            sep: ":"
            icon: "asset/kei.png"
            suffix: ""
          - os: windows
            runner: windows-latest
            sep: ";"
            icon: "asset/kei.ico"
            suffix: ".exe"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      shell: bash
      run: |
        pyinstaller --noconsole --onefile \
          --icon="${{ matrix.icon }}" \
          --name "BA_TL_Launcher_${{ matrix.os }}" \
          --add-data "asset${{ matrix.sep }}asset" \
          --collect-all customtkinter \
          --clean \
          main.py

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: dist/BA_TL_Launcher_${{ matrix.os }}${{ matrix.suffix }}
        name: ${{ github.event.inputs.release-name }}
        tag_name: ${{ github.event.inputs.release-tag }}
        generate_release_notes: true